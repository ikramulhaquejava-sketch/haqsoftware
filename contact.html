<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Haq Software | Get in Touch</title>
    <meta name="description" content="Contact Haq Software in Moradabad for software development, digital marketing, and SEO services. Call or email us today.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="canonical" href="https://www.haqsoftware.com/contact.html">
    <script src="anti-inspect.js" defer></script>
</head>
<body>
    <!-- Top Bar & Nav -->
    <div class="top-bar">...</div>
    <nav class="navbar">...</nav>

    <section class="page-header">
        <div class="container">
            <h1>Contact Us</h1>
            <p>We’d love to hear from you</p>
        </div>
    </section>

    <section class="contact-section">
        <div class="container">
            <div class="contact-grid">
                <div class="contact-info-block">
                    <h2>Get in Touch</h2>
                    <p>Reach out for a free consultation or any questions.</p>
                    <div class="contact-detail">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>Moradabad, Uttar Pradesh, India</span>
                    </div>
                    <div class="contact-detail">
                        <i class="fas fa-phone"></i>
                        <a href="tel:+919548192906">+91 95481 92906</a>
                    </div>
                    <div class="contact-detail">
                        <i class="fas fa-envelope"></i>
                        <a href="mailto:info@haqsoftware.com">ikramulhaque.java@gmail.com</a>
                    </div>
                </div>
                <div class="contact-form-block">
                    <h2>Send a Message</h2>
                    <form action="https://formsubmit.co/ikramulhaque.java@gmail.com" method="POST">
                        <input type="hidden" name="_subject" value="New inquiry from Haq Software website">
                        <input type="hidden" name="_captcha" value="false">
                        <div class="form-group">
                            <label for="name">Name *</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email *</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message *</label>
                            <textarea id="message" name="message" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Send</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">...</footer>
    <script>...</script>
</body>
</html>
